services:
  tdengine-coverage-cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdengine-coverage-cron
    restart: unless-stopped
    volumes:
      - ./tdengine_coveage_alarm.py:/home/tdengine_coveage_alarm.py:ro
      - ./cron_logs:/var/log/cron
    environment:
      - TZ=Asia/Shanghai
