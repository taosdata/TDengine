name: ARC::Deploy TSDB Dev

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 0 * * *'
  workflow_call:
    inputs:
      branch_name:
        description: 'Branch name for TSDB deployment'
        type: string
        default: 'main'
    secrets:
      TSDB_BOT_FEISHU_WEBHOOK_URL:
        required: true
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name for TSDB deployment'
        type: choice
        default: 'main'
        options:
          - main
          - "3.0"

env:
  K8S_NAMESPACE: tsdb-dev
  REGISTRY_HOST: 192.168.1.42
  REGISTRY_REPO: tdasset/tsdb-ee
  IMAGE_LOOKBACK_DAYS: 14

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-tsdb-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: tsdb-deploy
    steps:
      - name: Resolve deployment parameters
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              '0 22 * * *')
                BRANCH_NAME='main'
                ;;
              '0 0 * * *')
                BRANCH_NAME='3.0'
                ;;
              *)
                echo "Unsupported schedule: ${{ github.event.schedule }}"
                exit 1
                ;;
            esac
          else
            BRANCH_NAME='${{ github.event.inputs.branch_name || inputs.branch_name || github.ref_name }}'
          fi

          case "$BRANCH_NAME" in
            main)
              VERSION_PREFIX='3.4.0.0'
              ;;
            3.0)
              VERSION_PREFIX='3.4.0.100'
              ;;
            *)
              echo "Unsupported branch_name: $BRANCH_NAME"
              exit 1
              ;;
          esac

          image_tag_exists() {
            local tag="$1"
            local manifest_path="/v2/${REGISTRY_REPO}/manifests/${tag}"
            local curl_args=(
              --silent
              --show-error
              --fail
              --location
              --connect-timeout 2
              --max-time 5
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json"
            )

            if curl "${curl_args[@]}" "http://${REGISTRY_HOST}${manifest_path}" > /dev/null 2>&1; then
              return 0
            fi

            if curl -k "${curl_args[@]}" "https://${REGISTRY_HOST}${manifest_path}" > /dev/null 2>&1; then
              return 0
            fi

            return 1
          }

          CLEAN_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]')
          IMAGE_LOOKBACK_OFFSET_DAYS=''
          BUILD_DATE=''
          IMAGE_TAG=''
          offset=0
          while [ "$offset" -le "${IMAGE_LOOKBACK_DAYS}" ]; do
            candidate_build_date=$(TZ=Asia/Shanghai date -d "-${offset} day" +%m%d)
            candidate_image_tag="${VERSION_PREFIX}.${candidate_build_date}"
            if image_tag_exists "${candidate_image_tag}"; then
              BUILD_DATE="${candidate_build_date}"
              IMAGE_TAG="${candidate_image_tag}"
              IMAGE_LOOKBACK_OFFSET_DAYS="${offset}"
              break
            fi
            echo "Image not found, continue fallback: ${REGISTRY_HOST}/${REGISTRY_REPO}:${candidate_image_tag}"
            offset=$((offset + 1))
          done

          if [ -z "${IMAGE_TAG}" ]; then
            echo "Failed to find image for version prefix ${VERSION_PREFIX} within ${IMAGE_LOOKBACK_DAYS} day(s)"
            exit 1
          fi

          TSDB_IMAGE="${REGISTRY_HOST}/${REGISTRY_REPO}:${IMAGE_TAG}"
          RELEASE_NAME="tsdb-${CLEAN_BRANCH}"
          TSDB_HOST="${RELEASE_NAME}-tsdb-br.kube.tdengine.net"
          TSDB_EXPLORER_URL="https://${TSDB_HOST}"

          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"
          echo "VERSION_PREFIX=$VERSION_PREFIX" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_LOOKBACK_OFFSET_DAYS=$IMAGE_LOOKBACK_OFFSET_DAYS" >> "$GITHUB_ENV"
          echo "TSDB_IMAGE=$TSDB_IMAGE" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"
          echo "TSDB_HOST=$TSDB_HOST" >> "$GITHUB_ENV"
          echo "TSDB_EXPLORER_URL=$TSDB_EXPLORER_URL" >> "$GITHUB_ENV"

          echo "Branch: $BRANCH_NAME"
          echo "Version prefix: $VERSION_PREFIX"
          echo "Build date: $BUILD_DATE"
          echo "Image fallback offset days: $IMAGE_LOOKBACK_OFFSET_DAYS"
          echo "TSDB image: $TSDB_IMAGE"
          echo "Release name: $RELEASE_NAME"
          echo "TSDB host: $TSDB_HOST"
          echo "TSDB Explorer URL: $TSDB_EXPLORER_URL"

      - name: Deploy tsdb dev
        shell: bash
        run: |
          set -euo pipefail

          cd /public/platform-group/helm/tsdb
          /home/runner/k8stool/helm --namespace "${K8S_NAMESPACE}" uninstall "$RELEASE_NAME" --kubeconfig /home/runner/k8stool/config || true
          while kubectl --kubeconfig /home/runner/k8stool/config get pvc "taos-data-${RELEASE_NAME}" -n "${K8S_NAMESPACE}" > /dev/null 2>&1; do
            echo 'Waiting for pvc...'
            sleep 1
          done

          /home/runner/k8stool/helm upgrade --install \
            --namespace "${K8S_NAMESPACE}" \
            --set name="$RELEASE_NAME" \
            --set tsdb_image="$TSDB_IMAGE" \
            "$RELEASE_NAME" ./ \
            --kubeconfig /home/runner/k8stool/config

      - name: Wait for tsdb explorer ready
        shell: bash
        run: |
          set -euo pipefail

          timeout_seconds=600
          start_time=$(date +%s)

          until curl -f -s --connect-timeout 2 "${TSDB_EXPLORER_URL}" > /dev/null; do
            current_time=$(date +%s)
            elapsed=$((current_time - start_time))
            if [ "$elapsed" -ge "$timeout_seconds" ]; then
              echo "Timed out after ${timeout_seconds}s waiting for TSDB Explorer at ${TSDB_EXPLORER_URL}"
              exit 1
            fi
            echo "Waiting for TSDB Explorer at ${TSDB_EXPLORER_URL}"
            sleep 5
          done

          echo "TSDB Explorer is reachable on ${TSDB_EXPLORER_URL}"

      - name: Send Feishu Message
        if: always()
        continue-on-error: true
        shell: bash
        env:
          TSDB_BOT_FEISHU_WEBHOOK_URL: ${{ secrets.TSDB_BOT_FEISHU_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          STATUS_TEXT='failed'
          if [ "${{ job.status }}" = 'success' ]; then
            STATUS_TEXT='success'
          fi

          export STATUS_TEXT
          export REPO_NAME=$(basename "$GITHUB_REPOSITORY")
          export RUN_URL="https://github.com/taosdata/${REPO_NAME}/actions/runs/${{ github.run_id }}"

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          message = "\n".join([
              f"TSDB dev deployment {os.environ['STATUS_TEXT']}",
              f"Branch: {os.environ['BRANCH_NAME']}",
              f"Version: {os.environ['VERSION_PREFIX']}",
              f"Build date: {os.environ['BUILD_DATE']}",
              f"Fallback offset days: {os.environ['IMAGE_LOOKBACK_OFFSET_DAYS']}",
              f"Image: {os.environ['TSDB_IMAGE']}",
              f"Release: {os.environ['RELEASE_NAME']}",
              f"Explorer: {os.environ['TSDB_EXPLORER_URL']}",
              f"Workflow: {os.environ['RUN_URL']}",
          ])

          payload = json.dumps({
              "msg_type": "text",
              "content": {"text": message},
          }).encode("utf-8")

          request = urllib.request.Request(
              os.environ["TSDB_BOT_FEISHU_WEBHOOK_URL"],
              data=payload,
              headers={"Content-Type": "application/json"},
          )

          with urllib.request.urlopen(request) as response:
              print(response.read().decode("utf-8"))
          PY
